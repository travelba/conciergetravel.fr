<body class="bg-surface text-on-surface antialiased flex flex-col min-h-screen font-body-md">
<!-- Header / Progress -->
<header class="flex items-center justify-between px-margin-mobile py-4 border-b border-outline-variant/10 bg-surface z-50 sticky top-0">
<div class="flex flex-col">
<span class="font-label-caps text-label-caps text-on-surface-variant mb-1">Étape 1 sur 3</span>
<div class="flex gap-1 mt-1">
<div class="h-1 w-8 bg-primary rounded-full"></div>
<div class="h-1 w-8 bg-surface-container-high rounded-full"></div>
<div class="h-1 w-8 bg-surface-container-high rounded-full"></div>
</div>
</div>
<button aria-label="Fermer" class="flex items-center justify-center w-touch-target h-touch-target text-on-surface-variant hover:text-primary transition-colors">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">close</span>
</button>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow flex flex-col px-margin-mobile py-8 pb-32">
<!-- Summary Card -->
<section class="mb-10 bg-surface-container-low rounded-xl p-4 border border-outline-variant/10">
<div class="flex items-start gap-4">
<div class="w-16 h-20 rounded-lg bg-surface-container-highest overflow-hidden flex-shrink-0">
<img alt="Hôtel de Crillon" class="w-full h-full object-cover" data-alt="A close-up, high-end architectural detail shot of a luxurious Parisian hotel facade, specifically the Hôtel de Crillon. The image features ornate stonework and classic French windows in a sober, elegant style. Soft, natural daylight creates a refined, high-key light mode aesthetic with minimal contrast. The mood is exclusive, sophisticated, and tranquil, fitting a premium travel editorial context." src="https://lh3.googleusercontent.com/aida-public/AB6AXuAyX1dVD2kewqw_7sVsyTHdDmdYS2hZNXQt7TyxcEDTgaavpcLbBqtdExQ-TzGGiqSTd2YeGOX_xvh2-AOH9TXyPDqOOaxuWvvPJ0GaBeOdQftoD2vn-z3jDGErnUedbSvdx7Jgx8wgKMp7Z1HUN01Mi9JGTMJojRfV3N667elkN_B3kpwovDMUXiYwo0H4h8npeJ4aMMJM8gQGuEic7gOk-mOMtLmMuSxDbbblUSsaCWATOrpTNeidsM0GjyszDuOQskqj6LFudKmz"/>
</div>
<div class="flex flex-col">
<h2 class="font-headline-md text-headline-md text-primary mb-1">Hôtel de Crillon</h2>
<p class="font-body-md text-body-md text-on-surface-variant mb-2">Grand Premier Room</p>
<div class="flex items-center gap-2 font-label-caps text-label-caps text-on-surface-variant">
<span class="material-symbols-outlined text-[16px]">calendar_today</span>
<span>12 Oct - 15 Oct</span>
<span class="mx-1">•</span>
<span>2 Voyageurs</span>
</div>
</div>
</div>
</section>
<!-- Form Section -->
<section class="flex flex-col gap-6">
<h1 class="font-headline-lg text-headline-lg text-primary mb-2">Vos informations</h1>
<form class="flex flex-col gap-5">
<!-- Civility & Name Row -->
<div class="grid grid-cols-3 gap-3">
<div class="col-span-1 flex flex-col">
<label class="font-label-caps text-label-caps text-on-surface-variant mb-2" for="civility">Titre</label>
<select class="bg-surface border border-outline-variant/20 rounded-DEFAULT h-touch-target px-3 font-body-md text-on-surface focus:border-primary focus:ring-0 outline-none appearance-none" id="civility">
<option>M.</option>
<option>Mme</option>
</select>
</div>
<div class="col-span-2 flex flex-col">
<label class="font-label-caps text-label-caps text-on-surface-variant mb-2" for="firstName">Prénom</label>
<input class="bg-surface border border-outline-variant/20 rounded-DEFAULT h-touch-target px-4 font-body-md text-on-surface focus:border-primary focus:ring-0 outline-none placeholder:text-on-surface-variant/50" id="firstName" placeholder="Jean" type="text"/>
</div>
</div>
<div class="flex flex-col">
<label class="font-label-caps text-label-caps text-on-surface-variant mb-2" for="lastName">Nom</label>
<input class="bg-surface border border-outline-variant/20 rounded-DEFAULT h-touch-target px-4 font-body-md text-on-surface focus:border-primary focus:ring-0 outline-none placeholder:text-on-surface-variant/50" id="lastName" placeholder="Dupont" type="text"/>
</div>
<div class="flex flex-col">
<label class="font-label-caps text-label-caps text-on-surface-variant mb-2" for="email">Adresse Email</label>
<input class="bg-surface border border-outline-variant/20 rounded-DEFAULT h-touch-target px-4 font-body-md text-on-surface focus:border-primary focus:ring-0 outline-none placeholder:text-on-surface-variant/50" id="email" placeholder="jean.dupont@email.com" type="email"/>
</div>
<div class="flex flex-col">
<label class="font-label-caps text-label-caps text-on-surface-variant mb-2" for="phone">Téléphone (Optionnel)</label>
<div class="flex gap-2">
<select class="w-1/3 bg-surface border border-outline-variant/20 rounded-DEFAULT h-touch-target px-3 font-body-md text-on-surface focus:border-primary focus:ring-0 outline-none appearance-none">
<option>+33</option>
<option>+1</option>
<option>+44</option>
</select>
<input class="w-2/3 bg-surface border border-outline-variant/20 rounded-DEFAULT h-touch-target px-4 font-body-md text-on-surface focus:border-primary focus:ring-0 outline-none placeholder:text-on-surface-variant/50" id="phone" placeholder="6 12 34 56 78" type="tel"/>
</div>
</div>
</form>
</section>
<!-- Trust Signals -->
<section class="mt-12 flex flex-col gap-4">
<div class="flex items-center gap-3 text-on-surface-variant">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">lock</span>
<span class="font-body-md text-body-md">Données sécurisées et cryptées</span>
</div>
<div class="flex items-center gap-3 text-on-surface-variant">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">support_agent</span>
<span class="font-body-md text-body-md">Conseiller disponible 24/7</span>
</div>
</section>
</main>
<!-- Bottom Action Bar -->
<div class="fixed bottom-0 left-0 w-full bg-surface border-t border-outline-variant/10 px-margin-mobile py-4 z-50">
<button class="w-full bg-primary text-on-primary h-touch-target rounded-DEFAULT font-interactive text-interactive flex items-center justify-center hover:bg-primary/90 transition-colors">
            Continuer vers le paiement
        </button>
</div>
